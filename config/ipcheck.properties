#-------------------------------------------------------------
# IP 連線防護設定
#-------------------------------------------------------------

# 是否啟用 IP 封包驗證（開啟後，下方部分設定會被忽略）
IPCHECKPACK = false

#-------------------------------------------------------------

# 是否啟用 IP 連線檢查
# 連線檢查相關設定
IPCHECK = false

# 相同 IP 在指定時間內重複連線的判定區間（毫秒）
# 在這段時間內重複連線，錯誤次數會 +1
TIMEMILLIS = 90000

# 達到指定次數後，切斷同一 IP 的所有連線
COUNT = 300

# 達到指定次數後，是否封鎖 IP 並寫入資料庫（true=是，false=否）
SETDB = false

# Linux 系統是否加入 ufw 封鎖清單（true=是，false=否）
# Windows 不適用，且必須先啟用 SETDB 才會生效
UFW = false

#-------------------------------------------------------------

# 是否限制同一 IP 只能維持一個連線
ISONEIP = false

#-------------------------------------------------------------

# 同一 IP 在指定時間內只允許建立一次連線（毫秒，0=不啟用）
ONETIMEMILLIS = 0
#-------------------------------------------------------------
# 同一帳號重複登入檢查間隔（秒）
ACCLOGINTIMEMILLIS = 10
# 偵測到同帳號重複登入時，是否直接封鎖該帳號 IP（True=是，False=否）
ACCLOGINBANIP = False
#-------------------------------------------------------------