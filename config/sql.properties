#-------------------------------------------------------------
# 資料庫連線設定
#-------------------------------------------------------------

# MariaDB 驅動類別
Driver_LOGIN = org.mariadb.jdbc.Driver

# 登入資料庫主機位址
URL1_LOGIN = jdbc:mariadb://localhost:3306/

# 登入資料庫名稱
URL2_LOGIN = 880v2

# 登入連線參數（建議保留 UTF-8）
URL3_LOGIN = ?useUnicode=true&characterEncoding=utf8

# 登入資料庫帳號
Login_LOGIN = root

# 登入資料庫密碼
Password_LOGIN = root

# 主資料庫主機位址
URL1 = jdbc:mariadb://localhost:3306/

# 主資料庫名稱
URL2 = 880v2

# 主連線參數（建議保留 UTF-8）
URL3 = ?useUnicode=true&characterEncoding=utf8

# 主資料庫帳號
Login = root

# 主資料庫密碼
Password = root