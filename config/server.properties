#-------------------------------------------------------------
# Server config
#-------------------------------------------------------------
# 是否開啟新排行系統(true or false)
UserRanking = true
#-------------------------------------------------------------
# 是否開啟官方簽到系統(true or false)
Attend = true
# 簽到需要時間(秒)
NormalMaxTime = 3600
# 幾點更新(0-23)
ClearClock = 6
#-------------------------------------------------------------
# 是否用【beanfun】方式登入伺服器 true=使用 BeanFun 登入流程(可自動建帳號) false=使用一般登入流程
Bean_Fun = false
#----------------
# 當 Bean_Fun=false 時，BenJi=true 使用標準登入封包；BenJi=false 使用預設登入封包流程
BenJi = true
#-------------------------------------------------------------
# 是否開啟封包顯示(true or false)
# C--->顯示
opcode_C = true
# S--->顯示
opcode_S = true
#-------------------------------------------------------------
# 火神系統類型 1=原本伊薇火神(xml)  2=l1jtw火神製作(DB化)
Item_Craft = 2
#-------------------------------------------------------------
# 周任務類型設置
# 是否開啟周任務(8.1不支持周任務 設關閉) true=開啟 false=關閉
Week_Quest = true
#-----------------------------
# 0是每日更新，1是周更新
WeekQuest_UpdateType = 0
#-----------------------------
# 星期幾更新 1-7
WeekQuest_UpdateWeek = 6
# 幾點更新 單位24小時
WeekQuest_UpdateTime = 23
#-------------------------------------------------------------
# 管理介面開關 True=是, False=否
GUI = false
#-------------------------------------------------------------
# 使用的伺服器編號
ServerNo = 1
#-------------------------------------------------------------
# 使用ip位置
GameserverHostname= *
#-------------------------------------------------------------
# 服務器監聽端口以"-"減號分隔 允許設置多個(允許設置一個)2022,2021
GameserverPort=2001
#-------------------------------------------------------------
# 是否使用 Netty 網路層 (true=Netty, false=傳統Socket)
UseNetty = false
#-------------------------------------------------------------
# 語系設置 0:英文版 3:繁體中文 5:簡體中文
ClientLanguage = 3
# 封包與字串編碼（繁中傳統客戶端通常使用 MS950；若是 Unicode 客戶端再改 UTF8）
ClientEncoding = MS950
#-------------------------------------------------------------
# 自動重新啟動 (單位:時間 小時:分鐘 範例> 04:30)
# null 不執行自動重新啟動(使用,分隔重新啟動時間欄位)
# AutoRestart = 15:30
AutoRestart = null
#-------------------------------------------------------------
# 顯示登入公告
News = false
#-------------------------------------------------------------
# 伺服器時區的設定 CST:中國標準時 TST:台灣標準時 HKT:香港標準時 CCT:中原標準時 JST:日本標準時 
TimeZone = TST
#-------------------------------------------------------------
# 閒置人物自動斷線時間 (單位:分)
# 0-35791(0不執行自動斷線)
AutomaticKick = 0
#-------------------------------------------------------------
# 人物資料自動保存時間 (單位:秒)
AutosaveInterval = 1200
#-------------------------------------------------------------
# 人物物品資料自動保存時間 (單位:秒)
AutosaveIntervalOfInventory = 600
#-------------------------------------------------------------
# 自動建立帳號
AutoCreateAccounts = true
#-------------------------------------------------------------
# 允許最大連線用戶
MaximumOnlineUsers = 5000
#-------------------------------------------------------------
# 客戶端接收信息範圍 (-1為畫面內可見)
PcRecognizeRange = -1
#-------------------------------------------------------------
# 快速鍵記憶處理執行
CharacterConfigInServerSide = true
#-------------------------------------------------------------
# 端口重置時間(單位:分鐘)
restartlogin = 240