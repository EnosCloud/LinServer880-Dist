#-------------------------------------------------------------
# 伺服器基本設定
#-------------------------------------------------------------
# 是否啟用新排行系統（true=啟用，false=停用）
UserRanking = true
#-------------------------------------------------------------
# 是否啟用每日簽到功能（true=啟用，false=停用）
Attend = true
# 完成一次簽到需要累積的時間（秒）
NormalMaxTime = 3600
# 每日重置時間（24 小時制，0-23）
ClearClock = 6
#-------------------------------------------------------------
# 是否使用 BeanFun 登入流程（true=使用 BeanFun，並可自動建帳號；false=一般登入）
Bean_Fun = false
#----------------
# BeanFun 關閉時的登入封包流程：true=標準流程，false=預設流程
BenJi = true
#-------------------------------------------------------------
# 是否顯示 C 封包內容（除錯用）
# C--->顯示
opcode_C = true
# 是否顯示 S 封包內容（除錯用）
# S--->顯示
opcode_S = true
#-------------------------------------------------------------
# 火神製作系統類型：1=原本伊薇火神（XML），2=l1jtw 火神（資料庫版）
Item_Craft = 2
#-------------------------------------------------------------
# 周任務設定
# 是否啟用周任務（8.1 不支援周任務，請設 false）
Week_Quest = true
#-----------------------------
# 更新模式：0=每日更新，1=每週更新
WeekQuest_UpdateType = 0
#-----------------------------
# 更新星期：1-7
WeekQuest_UpdateWeek = 6
# 更新時間：24 小時制
WeekQuest_UpdateTime = 23
#-------------------------------------------------------------
# 是否啟用管理介面
GUI = false
#-------------------------------------------------------------
# 本伺服器編號
ServerNo = 1
#-------------------------------------------------------------
# 伺服器綁定 IP，填 * 代表所有網卡
GameserverHostname= *
#-------------------------------------------------------------
# 伺服器監聽埠，若要多埠請用逗號分隔
GameserverPort=2001
#-------------------------------------------------------------
# 是否使用 Netty 網路層（true=Netty，false=傳統 Socket）
UseNetty = false
#-------------------------------------------------------------
# 語系設定：0=英文，3=繁體中文，5=簡體中文
ClientLanguage = 3
# 封包與字串編碼（繁中傳統客戶端通常使用 MS950；Unicode 客戶端再改 UTF8）
ClientEncoding = MS950
#-------------------------------------------------------------
# 自動重新啟動（格式：時:分，例如 04:30）
# null=不執行自動重新啟動
# AutoRestart = 15:30
AutoRestart = null
#-------------------------------------------------------------
# 是否顯示登入公告
News = false
#-------------------------------------------------------------
# 伺服器時區設定：CST=中國標準時、TST=台灣標準時、HKT=香港標準時、CCT=中原標準時、JST=日本標準時
TimeZone = TST
#-------------------------------------------------------------
# 閒置人物自動斷線時間（分鐘，0=不啟用）
AutomaticKick = 0
#-------------------------------------------------------------
# 角色資料自動存檔間隔（秒）
AutosaveInterval = 1200
#-------------------------------------------------------------
# 角色背包資料自動存檔間隔（秒）
AutosaveIntervalOfInventory = 600
#-------------------------------------------------------------
# 是否自動建立帳號
AutoCreateAccounts = true
#-------------------------------------------------------------
# 允許同時在線人數上限
MaximumOnlineUsers = 5000
#-------------------------------------------------------------
# 客戶端可接收訊息的最大範圍（-1=畫面內可見）
PcRecognizeRange = -1
#-------------------------------------------------------------
# 是否由伺服器端保存快捷鍵與角色設定
CharacterConfigInServerSide = true
#-------------------------------------------------------------
# 登入埠重置時間（分鐘）
restartlogin = 240